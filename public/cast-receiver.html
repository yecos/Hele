<!DOCTYPE html>
<html>
<head>
  <title>XuperStream Cast</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: system-ui, sans-serif; }

    /* Loading screen */
    #loading-screen {
      position: fixed; inset: 0; z-index: 100;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #0a0a0a; color: #fff;
    }
    #loading-screen .logo { width: 64px; height: 64px; margin-bottom: 20px; }
    #loading-screen h2 { font-size: 22px; margin-bottom: 6px; }
    #loading-screen h2 span { color: #dc2626; }
    #loading-screen p { color: #666; font-size: 13px; }
    .spinner {
      width: 36px; height: 36px; margin-bottom: 16px;
      border: 3px solid rgba(255,255,255,0.08);
      border-top-color: #dc2626;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Video player (for HLS) */
    #video-player {
      position: fixed; inset: 0;
      display: none; align-items: center; justify-content: center;
      background: #000;
    }
    #video-player video {
      width: 100%; height: 100%; object-fit: contain;
    }

    /* Iframe player (for embed URLs) */
    #iframe-player {
      position: fixed; inset: 0;
      display: none;
      background: #000;
    }
    #iframe-player iframe {
      width: 100%; height: 100%; border: 0;
    }

    /* Info bar overlay */
    #info-bar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
      background: linear-gradient(to top, rgba(0,0,0,0.95), rgba(0,0,0,0.7), transparent);
      padding: 40px 32px 20px;
      opacity: 0; transition: opacity 0.3s;
      pointer-events: none;
    }
    #info-bar.visible { opacity: 1; }
    #info-bar .title { color: #fff; font-size: 20px; font-weight: 700; }
    #info-bar .subtitle { color: #999; font-size: 13px; margin-top: 4px; }
  </style>
</head>
<body>

  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="spinner"></div>
    <img class="logo" src="/logo.svg" alt="XuperStream" />
    <h2>Xuper<span>Stream</span></h2>
    <p>Esperando contenido...</p>
  </div>

  <!-- HLS Video Player -->
  <div id="video-player">
    <video id="media-video" autoplay playsinline></video>
  </div>

  <!-- Iframe Player (for embed URLs) -->
  <div id="iframe-player">
    <iframe id="media-iframe" allowfullscreen allow="autoplay; fullscreen; encrypted-media; picture-in-picture" allowTransparency></iframe>
  </div>

  <!-- Info Bar -->
  <div id="info-bar">
    <div class="title" id="info-title"></div>
    <div class="subtitle" id="info-subtitle"></div>
  </div>

  <!-- Cast Receiver SDK -->
  <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.6.16/dist/hls.min.js"></script>

  <script>
    const context = cast.framework.CastReceiverContext.getInstance();
    const playerManager = context.getPlayerManager();
    const NAMESPACE = 'urn:x-cast:com.xuperstream';
    const INFO_TIMEOUT = 6000;

    let hlsInstance = null;
    let infoTimeout = null;

    // Show info bar
    function showInfo(title, subtitle) {
      const bar = document.getElementById('info-bar');
      document.getElementById('info-title').textContent = title || '';
      document.getElementById('info-subtitle').textContent = subtitle || '';
      bar.classList.add('visible');
      if (infoTimeout) clearTimeout(infoTimeout);
      infoTimeout = setTimeout(() => bar.classList.remove('visible'), INFO_TIMEOUT);
    }

    // Hide loading screen
    function hideLoading() {
      const el = document.getElementById('loading-screen');
      if (el) el.style.display = 'none';
    }

    // Play HLS stream
    function playHLS(url, metadata) {
      hideLoading();
      const videoPlayer = document.getElementById('video-player');
      const video = document.getElementById('media-video');
      videoPlayer.style.display = 'flex';

      if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }

      if (Hls.isSupported()) {
        hlsInstance = new Hls({
          enableWorker: true,
          lowLatencyMode: true,
          maxBufferLength: 30,
        });
        hlsInstance.loadSource(url);
        hlsInstance.attachMedia(video);
        hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
          video.play().catch(() => {});
          if (metadata) showInfo(metadata.title, metadata.subtitle);
        });
        hlsInstance.on(Hls.Events.ERROR, (event, data) => {
          if (data.fatal) {
            showInfo('Error de reproduccion', 'El stream no esta disponible');
          }
        });
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = url;
        video.load();
        video.play().catch(() => {});
        if (metadata) showInfo(metadata.title, metadata.subtitle);
      }
    }

    // Load embed URL in iframe
    function playEmbed(url, metadata) {
      hideLoading();
      const iframePlayer = document.getElementById('iframe-player');
      const iframe = document.getElementById('media-iframe');
      iframePlayer.style.display = 'block';
      iframe.src = url;
      if (metadata) showInfo(metadata.title, metadata.subtitle);
    }

    // Stop everything
    function stopPlayback() {
      if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
      document.getElementById('video-player').style.display = 'none';
      document.getElementById('iframe-player').style.display = 'none';
      document.getElementById('media-iframe').src = '';
      const video = document.getElementById('media-video');
      video.pause();
      video.removeAttribute('src');
      video.load();
      document.getElementById('info-bar').classList.remove('visible');
      document.getElementById('loading-screen').style.display = 'flex';
    }

    // Handle messages from sender
    context.addMessageListener(NAMESPACE, (event) => {
      const data = event.data;
      if (!data || !data.action) return;

      switch (data.action) {
        case 'PLAY_HLS':
          playHLS(data.url, { title: data.title, subtitle: data.subtitle });
          break;
        case 'PLAY_EMBED':
          playEmbed(data.url, { title: data.title, subtitle: data.subtitle });
          break;
        case 'STOP':
          stopPlayback();
          break;
        case 'SHOW_INFO':
          showInfo(data.title, data.subtitle);
          break;
      }
    });

    // Handle Default Media Receiver load requests (for HLS)
    playerManager.addEventListener(
      cast.framework.events.EventType.REQUEST_LOAD,
      (event) => {
        const loadRequest = event.request;
        const mediaInfo = loadRequest.media;

        if (mediaInfo && mediaInfo.contentUrl) {
          const url = mediaInfo.contentUrl;
          const metadata = mediaInfo.metadata
            ? { title: mediaInfo.metadata.title || '', subtitle: mediaInfo.metadata.subtitle || '' }
            : null;

          if (url.includes('.m3u8')) {
            playHLS(url, metadata);
          } else {
            playEmbed(url, metadata);
          }
        }
      }
    );

    // Player state events
    playerManager.addEventListener(
      cast.framework.events.EventType.PLAYBACK_STARTED,
      () => {
        const video = document.getElementById('media-video');
        showInfo('Reproduciendo', video.src || '');
      }
    );

    playerManager.addEventListener(
      cast.framework.events.EventType.PLAYBACK_ENDED,
      () => {
        // Show idle screen
      }
    );

    // Start receiver
    context.start({
      statusText: 'XuperStream listo'
    });
  </script>
</body>
</html>
